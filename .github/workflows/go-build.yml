name: Go build

# 触发事件 含标签v**g
on:
  push:
    tags:
      - "v**g"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.19

      - name: Change go env
        run: go env -w GO111MODULE=on

      - name: Build Windows
        env:
          GOOS: windows
          GOARCH: amd64
        working-directory: ./backup4abap_go
        run: go build -o backup_win64.exe ./main.go

      - name: Build Mac
        env:
          GOOS: darwin
          GOARCH: amd64
        working-directory: ./backup4abap_go
        run: go build -o backup_mac64 ./main.go

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: "压缩代码下载器，用于从已配置 backup4abap_interface 的 ICF 服务通过 HTTP 请求下载代码包到本地，并自动解压。"
          files: ./backup4abap_go/backup*
          token: ${{ secrets.RELEASE_TOKEN }}
